# /etc/nginx/sites-available/knowledge.lendinggenie.com
# Enable with: ln -s /etc/nginx/sites-available/knowledge.lendinggenie.com /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name knowledge.lendinggenie.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name knowledge.lendinggenie.com;

    ssl_certificate     /etc/letsencrypt/live/knowledge.lendinggenie.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/knowledge.lendinggenie.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # File upload limit (mbox files can be large)
    client_max_body_size 5120m;
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;

    # API + health → Fastify (port 3001)
    location ~ ^/(api|health)(/|$) {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else → Next.js (port 3000)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
