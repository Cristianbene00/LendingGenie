services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_USER: kb
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: lendinggenie
    volumes:
      - pgdata:/var/lib/postgresql/data
      # All *.sql files in migrations/ run automatically on first container init.
      # For subsequent deploys, run new migrations manually (see deployment guide).
      - ./scripts/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kb"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: always
    env_file: .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/data/uploads
    ports:
      - "127.0.0.1:3001:3001"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: always
    command: ["node_modules/.bin/tsx", "src/api/worker.ts"]
    env_file: .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/data/uploads

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: https://lendinggenie.blueflowtech.com
    restart: always
    env_file: .env.production
    depends_on:
      - api
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  pgdata:
  redisdata:
  uploads:
